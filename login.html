<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Login - Portafolio Gabriel</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <link href="img/favicon.ico" rel="icon" />

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Roboto:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css"
      rel="stylesheet"
    />

    <link href="css/style.css" rel="stylesheet" />

    <style>
      body {
        background:
          linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
          url("img/definicion-software.png");
        background-size: cover;
        background-position: center;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: rgba(52, 58, 64, 0.95);
        border: 2px solid #b89c6a; /* Tu color dorado */
        border-radius: 15px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      }
      .form-control {
        background: #1a1a1a !important;
        border: 1px solid #444 !important;
        color: white !important;
        height: 50px;
      }
      .form-control:focus {
        border-color: #b89c6a !important;
        box-shadow: none;
      }
    </style>
  </head>

  <body>
    <div class="login-card text-center">
      <a href="index.html">
        <img
          src="img/uplalogo.png"
          alt="Logo"
          class="img-fluid mb-4"
          style="max-height: 80px"
        />
      </a>

      <h3 class="text-white text-uppercase mb-4" style="letter-spacing: 3px">
        Acceso Admin
      </h3>

      <form id="loginForm">
        <div class="form-group text-left">
          <label class="text-primary small font-weight-bold"
            >CORREO ELECTRÓNICO</label
          >
          <input
            type="email"
            id="email"
            class="form-control"
            placeholder="r03420g@ms.upla.edu.pe"
            required
          />
        </div>
        <div class="form-group text-left">
          <label class="text-primary small font-weight-bold">CONTRASEÑA</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="********"
            required
          />
        </div>
        <button
          type="submit"
          class="btn btn-primary btn-block py-3 mt-4 font-weight-bold text-uppercase"
        >
          Iniciar Sesión
        </button>
      </form>

      <div class="mt-4">
        <a href="index.html" class="text-white-50 small"
          ><i class="fa fa-arrow-left mr-2"></i>Volver al Inicio</a
        >
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="js/auth.js"></script>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("email").value;
          const pass = document.getElementById("password").value;

          // Llamamos a la función
          iniciarSesion(email, pass);
        });
    </script>
  </body>
</html>
